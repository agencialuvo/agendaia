version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: velia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: velia
      POSTGRES_PASSWORD: velia
      POSTGRES_DB: velia_crm
    ports:
      - "5433:5432"
    volumes:
      - velia_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: velia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  velia_postgres_data:
